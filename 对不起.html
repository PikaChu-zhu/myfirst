<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>甜甜的告白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #ffeff5;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 中间的文字 */
        .text {
            position: absolute;
            font-size: 50px;
            font-weight: bold;
            color: #ff5e97;
            text-shadow: 0 0 15px rgba(255, 94, 151, 0.5);
            z-index: 10;
        }

        /* 爱心样式 */
        .heart {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #ff5e97;
            transform: rotate(-45deg);
            animation: float 4s linear infinite;
            opacity: 0.8;
        }

        .heart::before,
        .heart::after {
            content: '';
            width: 30px;
            height: 30px;
            background-color: #ff5e97;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before {
            top: -15px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 15px;
        }

        /* 爱心飘移动画 */
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(-45deg);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) rotate(-45deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="text">你只能要跟我好</div>
    <script>
        // 随机生成爱心
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // 随机大小、位置、速度
            const size = Math.random() * 20 + 15;
            const left = Math.random() * 100;
            const duration = Math.random() * 3 + 4;
            
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;
            heart.style.left = `${left}vw`;
            heart.style.animationDuration = `${duration}s`;
            
            document.body.appendChild(heart);
            
            // 动画结束后移除
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // 持续生成爱心
        setInterval(createHeart, 200);
    </script>
</body>
</html>
